# ─────────────────────────────────────────────────────────────────────────────
# turnserver-local.conf — coturn config for LOCAL development (Windows/Mac/Linux)
# GitHub: https://github.com/coturn/coturn
#
# ⚠️  This config is for LOCAL TESTING ONLY.
#     Use turnserver.conf for production (Hostinger VPS etc.)
#
# How to use:
#   1. Install Docker Desktop: https://www.docker.com/products/docker-desktop/
#   2. Double-click: TURN Server/start-turn-local.bat  (Windows)
#      OR run:       ./start-turn.sh                   (Linux/Mac)
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ───────────────────────────────────────────────────────────────────

# For local dev: use 127.0.0.1 as the external IP
# coturn will relay traffic on localhost — works for same-machine testing
# For LAN testing (other devices on your WiFi), replace with your local IP
# e.g. external-ip=192.168.1.100
external-ip=127.0.0.1

# Listen on all interfaces
listening-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349

# ── Relay Ports ───────────────────────────────────────────────────────────────
# Smaller range for local dev (full range 49152-65535 is too many ports for Docker on Windows)
min-port=49152
max-port=49200

# ── Authentication ────────────────────────────────────────────────────────────
# HMAC-SHA1 time-limited credentials — same algorithm as production
# This secret MUST match TURN_SECRET in your .env file
use-auth-secret
static-auth-secret=localdevelopmentsecret123

# Credential TTL (24 hours)
credential-lifetime=86400

# ── Realm ─────────────────────────────────────────────────────────────────────
realm=localhost

# ── Security (relaxed for local dev) ─────────────────────────────────────────
# Allow loopback for local testing (disabled in production)
# no-loopback-peers   ← commented out so localhost relay works

no-multicast-peers
no-cli
fingerprint

# ── Logging (verbose for debugging) ──────────────────────────────────────────
# Verbose logging helps debug ICE issues during development
verbose

# ── Performance ───────────────────────────────────────────────────────────────
relay-threads=2
