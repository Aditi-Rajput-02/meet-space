# ─────────────────────────────────────────────────────────────────────────────
# coturn TURN Server Configuration
# GitHub: https://github.com/coturn/coturn
#
# This file configures the coturn TURN/STUN server for the MeetSpace
# video-call application. Replace the placeholder values with your own.
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────

# The public IP address of your server (REQUIRED — replace with your server's IP)
external-ip=YOUR_SERVER_PUBLIC_IP

# Listening port for TURN/STUN (UDP + TCP)
listening-port=3478

# TLS/DTLS port (for secure TURN over TLS)
tls-listening-port=5349

# Listening IP (0.0.0.0 = all interfaces)
listening-ip=0.0.0.0

# ── Relay Ports ───────────────────────────────────────────────────────────────
# Range of UDP ports used for media relay.
# Open these ports in your firewall/security group!
min-port=49152
max-port=65535

# ── Authentication ────────────────────────────────────────────────────────────
# Use HMAC-SHA1 time-limited credentials (REST API style).
# The Node.js backend generates credentials using the same secret.
use-auth-secret

# Shared secret — CHANGE THIS to a long random string (min 32 chars)
# Generate one with: openssl rand -hex 32
static-auth-secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_STRING

# Credential TTL in seconds (86400 = 24 hours)
# Credentials expire after this time, forcing clients to refresh
credential-lifetime=86400

# ── Realm ─────────────────────────────────────────────────────────────────────
# Set to your domain name (used in TURN authentication)
realm=meetconnect.swiftcampus.com

# ── TLS Certificates (optional but recommended for production) ────────────────
# Uncomment and set paths to your SSL certificate files for TLS support.
# Using Let's Encrypt: certbot certonly --standalone -d your-domain.com
# cert=/etc/letsencrypt/live/your-domain.com/fullchain.pem
# pkey=/etc/letsencrypt/live/your-domain.com/privkey.pem

# ── Logging ───────────────────────────────────────────────────────────────────
# Log file location (comment out to log to stdout)
# log-file=/var/log/coturn/turnserver.log

# Verbose logging (disable in production for performance)
# verbose

# ── Security ──────────────────────────────────────────────────────────────────
# Deny loopback relay (prevents SSRF attacks)
no-loopback-peers

# Deny multicast relay
no-multicast-peers

# Disable CLI (not needed for production)
no-cli

# Fingerprint in TURN messages (recommended)
fingerprint

# ── Performance ───────────────────────────────────────────────────────────────
# Number of relay threads (set to number of CPU cores)
relay-threads=4

# ── STUN ──────────────────────────────────────────────────────────────────────
# Also act as a STUN server (enabled by default, no extra config needed)
