# ─────────────────────────────────────────────────────────────────────────────
# coturn TURN Server — Docker Compose
# GitHub: https://github.com/coturn/coturn
#
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#   docker compose restart        # Restart after config changes
# ─────────────────────────────────────────────────────────────────────────────

services:
  coturn:
    image: coturn/coturn:latest          # Official coturn image from Docker Hub
    container_name: meetspace-turn
    restart: unless-stopped

    # ── Network mode: host is required so coturn can bind to the real
    #    public IP and relay UDP media traffic correctly.
    #    On Linux this works natively. On Windows/Mac use port mapping below.
    # network_mode: host                 # ← Uncomment on Linux servers

    # ── Port mapping (use when network_mode: host is NOT available) ──────────
    ports:
      - "3478:3478/udp"    # STUN/TURN UDP
      - "3478:3478/tcp"    # STUN/TURN TCP
      - "5349:5349/udp"    # STUN/TURN TLS/DTLS UDP
      - "5349:5349/tcp"    # STUN/TURN TLS/DTLS TCP
      # Media relay port range — must match min-port/max-port in turnserver.conf
      - "49152-65535:49152-65535/udp"

    # ── Mount the config file into the container ─────────────────────────────
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      # Uncomment to mount TLS certificates:
      # - /etc/letsencrypt:/etc/letsencrypt:ro

    # ── Tell coturn to use our config file ───────────────────────────────────
    command: -c /etc/coturn/turnserver.conf

    # ── Resource limits ──────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

    # ── Health check ─────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "turnutils_stunclient", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # ── Logging ──────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
